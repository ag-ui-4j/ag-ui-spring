name: Test

# Build and test on every push to main and on pull requests.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out ag-ui-spring
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ag-ui resolves from Maven Central (see <ag-ui.version> in pom.xml).
      - name: Build and run tests
        run: mvn -B verify
